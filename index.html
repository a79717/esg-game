<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ESG 減脂挑戰：穩定版1.1</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
/**
 * 遊戲配置
 */
const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 400, height: 700 },
    physics: { default: 'arcade', arcade: { gravity: { y: 2200 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

let player, obstacles, scoreText, levelText, nextLevelText, score = 0;
let isGameOver = false, isPaused = false;
let nextLevelScore = 100, currentLevel = 1, hasShield = false, shieldVisual;
let moveSpeed = -450, spawnRate = 1200, timerEvent, bg;

const game = new Phaser.Game(config);

function preload() {
    // 請確保圖片檔案與此 HTML 放在同一目錄下
    this.load.image('run1', 'player_run1.png');
    this.load.image('run2', 'player_run2.png');
    this.load.image('obstacle', 'food.png');
    this.load.image('bgImg', 'BG.png');
}

function create() {
    // 重設狀態
    isGameOver = false; isPaused = false; score = 0; currentLevel = 1;
    moveSpeed = -450; spawnRate = 1200; nextLevelScore = 100; hasShield = false;

    const groundY = 620;

    // 1. 背景
    bg = this.add.tileSprite(0, 0, 400, 700, 'bgImg').setOrigin(0, 0).setDepth(0);
    const bgScale = 700 / bg.height;
    bg.tileScaleX = bgScale;
    bg.tileScaleY = bgScale;

    // 2. 地面 (隱形成員，僅用於碰撞)
    const ground = this.add.rectangle(200, groundY + 25, 400, 50, 0x000000, 0);
    this.physics.add.existing(ground, true);

    // 3. 動畫製作
    this.anims.create({
        key: 'run_anim',
        frames: [{ key: 'run1' }, { key: 'run2' }],
        frameRate: 10,
        repeat: -1
    });

    // 4. 玩家設定
    player = this.physics.add.sprite(80, groundY, 'run1').setDepth(10);
    player.play('run_anim');
    player.setOrigin(0.5, 1);
    player.setDisplaySize(60, 60);
    player.body.setCollideWorldBounds(true);
    player.body.setSize(30, 50);

    // 5. 護盾視覺效果
    shieldVisual = this.add.circle(0, 0, 35, 0x4fc3f7, 0.4).setDepth(11);
    shieldVisual.setStrokeStyle(3, 0x01579b);
    shieldVisual.setVisible(false);

    // 6. 障礙物群組 (提前初始化物理)
    obstacles = this.physics.add.group();

    // 碰撞偵測
    this.physics.add.collider(player, ground);
    this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

    // 7. UI 文字
    scoreText = this.add.text(20, 40, '減脂里程: 0m', { fontSize: '24px', fill: '#ffffff', stroke: '#000', strokeThickness: 4 }).setDepth(100);
    levelText = this.add.text(20, 75, '挑戰等級: LV.1', { fontSize: '18px', fill: '#81c784', stroke: '#000', strokeThickness: 3 }).setDepth(100);
    nextLevelText = this.add.text(20, 105, `下一目標: 100m`, { fontSize: '14px', fill: '#fff' }).setDepth(100);

    // 8. 啟動生成器
    startSpawning(this);

    // 9. 輸入事件
    this.input.on('pointerdown', () => {
        if (!isGameOver && !isPaused && (player.body.touching.down || player.body.blocked.down)) {
            player.body.setVelocityY(-950);
        }
    });
}

function update() {
    if (isGameOver || isPaused) return;

    // 背景滾動與分數累加
    bg.tilePositionX += 5;
    score += 0.25;
    scoreText.setText('減脂里程: ' + Math.floor(score) + 'm');
    
    // 護盾跟隨
    shieldVisual.x = player.x;
    shieldVisual.y = player.y - 30;

    // 難度漸進增長
    moveSpeed -= 0.1;

    // 升級門檻檢查
    if (score >= nextLevelScore) {
        showLevelUpMenu(this);
        currentLevel++;
        nextLevelScore *= 1.2; 
        levelText.setText('挑戰等級: LV.' + currentLevel);
        nextLevelText.setText(`下一目標: ${nextLevelScore}m`);
    }

    // 動畫補全
    if (player.body.touching.down || player.body.blocked.down) {
        if (!player.anims.isPlaying) player.play('run_anim');
    } else {
        player.stop();
    }

    // 自動清理超出螢幕的障礙物
    obstacles.getChildren().forEach(obs => {
        if (obs.x < -50) {
            obs.destroy();
        }
    });
}

function spawnObstacle(scene) {
    if (isGameOver || isPaused) return;

    const type = Phaser.Math.Between(0, 2);
    let yPos = (type === 0) ? 620 : (type === 1 ? 510 : 400);
    
    let obs;
    // 檢查紋理是否載入成功
    if (scene.textures.exists('obstacle')) {
        obs = obstacles.create(450, yPos, 'obstacle');
    } else {
        // 若圖片遺失則噴出紅色方塊作為保險
        obs = scene.add.rectangle(450, yPos, 40, 40, 0xff0000);
        obstacles.add(obs);
    }

    obs.setDepth(20);
    obs.setOrigin(0.5, 1);
    if (obs.setDisplaySize) obs.setDisplaySize(50, 50);

    // 物理行為
    obs.body.setAllowGravity(false);
    obs.body.setVelocityX(moveSpeed - Phaser.Math.Between(0, 100));
}

function startSpawning(scene) {
    if (timerEvent) timerEvent.destroy();
    
    timerEvent = scene.time.addEvent({
        delay: spawnRate,
        callback: spawnObstacle,
        args: [scene],
        callbackScope: scene,
        loop: true
    });
}

function showLevelUpMenu(scene) {
    isPaused = true;
    scene.physics.pause();
    timerEvent.paused = true;
    player.stop();
    
    const menuGroup = scene.add.container(0, 0).setDepth(200);
    const menuBg = scene.add.graphics();
    menuBg.fillStyle(0x000000, 0.85);
    menuBg.fillRect(0, 0, 400, 700);
    menuGroup.add(menuBg);

    const title = scene.add.text(200, 150, `🏆 LV.${currentLevel} 覺醒`, { fontSize: '32px', color: '#81c784', fontWeight: 'bold' }).setOrigin(0.5);
    menuGroup.add(title);

    const options = [
        { title: '🛡️ 減脂護盾', desc: '抵擋一次傷害', action: () => { hasShield = true; shieldVisual.setVisible(true); } },
        { title: '⚡️ 節能加速', desc: '衝刺+50m但速度提升', action: () => { score += 50; moveSpeed -= 150; } },
        { title: '📉 垃圾減量', desc: '障礙物頻率降低', action: () => { spawnRate += 300; startSpawning(scene); } }
    ];

    options.forEach((opt, index) => {
        const btnY = 340 + (index * 110);
        const btn = scene.add.rectangle(200, btnY, 300, 85, 0x2e7d32).setInteractive();
        const txt = scene.add.text(200, btnY, opt.title + '\n' + opt.desc, { fontSize: '18px', align: 'center', color: '#ffffff', lineSpacing: 5 }).setOrigin(0.5);
        
        menuGroup.add([btn, txt]);

        btn.on('pointerdown', () => {
            opt.action();
            menuGroup.destroy();
            isPaused = false;
            scene.physics.resume();
            timerEvent.paused = false;
        });
    });
}

function hitObstacle(p, obs) {
    if (isGameOver || isPaused) return;
    
    if (hasShield) {
        hasShield = false;
        shieldVisual.setVisible(false);
        obs.destroy();
        return;
    }

    // 遊戲結束邏輯
    isGameOver = true;
    this.physics.pause();
    player.stop();
    player.setTint(0xff0000);
    this.cameras.main.shake(300, 0.04);

    const resultBox = this.add.graphics();
    resultBox.fillStyle(0x000000, 0.9);
    resultBox.fillRoundedRect(30, 180, 340, 380, 15).setDepth(300);

    this.add.text(200, 230, `【ESG 結算戰報】`, { fontSize: '28px', fill: '#81c784', fontWeight: 'bold' }).setOrigin(0.5).setDepth(301);
    this.add.text(200, 370, `最終里程：${Math.floor(score)} m\n達成等級：LV.${currentLevel}\n\n「您的每一小步，\n 都是公司淨零排放的一大步！」`, { fontSize: '18px', fill: '#ffffff', align: 'center', lineSpacing: 10 }).setOrigin(0.5).setDepth(301);
    
    const restartBtn = this.add.text(200, 500, '◀ 重新挑戰 ▶', { fontSize: '22px', fill: '#fff', backgroundColor: '#d32f2f', padding: 12 }).setOrigin(0.5).setInteractive().setDepth(301);
    restartBtn.on('pointerdown', () => window.location.reload());
}
</script>
</body>
</html>
