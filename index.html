<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ESG 企業減脂挑戰</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 400, height: 700 },
    physics: { default: 'arcade', arcade: { gravity: { y: 1800 }, debug: false } }, // 已關閉 Debug 模式
    scene: { preload: preload, create: create, update: update }
};

let player, obstacles, scoreText, isGameOver = false, score = 0;
const game = new Phaser.Game(config);

function preload() {}

function create() {
    isGameOver = false; score = 0;
    const groundY = config.scale.height - 50;
    this.cameras.main.setBackgroundColor('#f1f8e9');

    const ground = this.add.rectangle(200, groundY + 25, 400, 50, 0x66bb6a);
    this.physics.add.existing(ground, true);

    player = this.add.rectangle(80, groundY - 40, 40, 40, 0x42a5f5);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);

    obstacles = this.physics.add.group();
    this.physics.add.collider(player, ground);
    this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

    scoreText = this.add.text(20, 40, '減脂里程: 0m', { fontSize: '24px', fill: '#1b5e20', fontWeight: 'bold' });

    this.time.addEvent({ delay: 1100, callback: spawnObstacle, callbackScope: this, loop: true });

    this.input.on('pointerdown', () => {
        if (player.body.touching.down || player.body.blocked.down) player.body.setVelocityY(-850);
    });
}

function update() {
    if (isGameOver) return;
    score += 0.25;
    scoreText.setText('減脂里程: ' + Math.floor(score) + 'm');
}

function spawnObstacle() {
    if (isGameOver) return;
    const x = 450;
    const type = Phaser.Math.Between(0, 2);
    let y, color, h;

    if (type === 0) { y = config.scale.height - 50; h = 60; color = 0xef5350; } // 地面
    else if (type === 1) { y = config.scale.height - 130; h = 40; color = 0xffa726; } // 低空
    else { y = config.scale.height - 230; h = 40; color = 0x7e57c2; } // 高空

    const obs = this.add.rectangle(x, y, 35, h, color);
    obs.setOrigin(0.5, 1);
    obstacles.add(obs);
    this.physics.add.existing(obs);
    obs.body.setAllowGravity(false);
    obs.body.setVelocityX(Phaser.Math.Between(-380, -580));
}

function hitObstacle(player, obstacle) {
    if (isGameOver) return;
    isGameOver = true;
    this.physics.pause();
    this.cameras.main.shake(250, 0.03);

    const finalDist = Math.floor(score);
    const calories = (finalDist * 0.05).toFixed(1);
    const co2 = (finalDist * 0.0002).toFixed(4);

    const resultBox = this.add.graphics();
    resultBox.fillStyle(0x000000, 0.85);
    resultBox.fillRoundedRect(30, 180, 340, 340, 15);

    this.add.text(200, 230, `【ESG 減脂戰報】`, { fontSize: '28px', fill: '#81c784', fontWeight: 'bold' }).setOrigin(0.5);
    
    const reportText = `🏃 慢跑里程：${finalDist} m\n🔥 消耗熱量：${calories} kcal\n🌿 累積減碳：${co2} kg-CO2e\n\n您的每一小步，\n都是公司淨零的一大步！`;
    this.add.text(200, 340, reportText, { fontSize: '20px', fill: '#ffffff', align: 'center', lineSpacing: 10 }).setOrigin(0.5);

    const restartBtn = this.add.text(200, 460, '◀ 重新挑戰 ▶', { fontSize: '22px', fill: '#fff', backgroundColor: '#2e7d32', padding: 12 })
        .setOrigin(0.5).setInteractive().on('pointerdown', () => window.location.reload());
}
</script>
</body>
</html>
