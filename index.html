<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ESG 企業減脂挑战版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
// --- 遊戲配置 ---
const config = {
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 400,
        height: 700
    },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1800 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

// --- 全域變數 ---
let player, obstacles, scoreText, score = 0, isGameOver = false, isPaused = false;
let nextLevelScore = 100;
let hasShield = false;
let shieldVisual;
let moveSpeed = -350; // 障礙物初始速度
let spawnRate = 1200; // 障礙物生成頻率
let timerEvent, bg;

const game = new Phaser.Game(config);

// --- 1. 資源預載 ---
function preload() {
    // 記得將圖片上傳至 esg-game 根目錄
    this.load.image('run1', 'player_run1.png');
    this.load.image('run2', 'player_run2.png');
    this.load.image('obstacle', 'food.png');
    this.load.image('bgImg', 'BG.png'); // 預載你上傳的客製化背景
}

// --- 2. 場景建立 ---
function create() {
    // 初始化狀態
    isGameOver = false; isPaused = false; score = 0; 
    moveSpeed = -350; spawnRate = 1200; nextLevelScore = 100; hasShield = false;

    const groundY = config.scale.height - 50;

    // A. 無限捲動背景
    bg = this.add.tileSprite(0, 0, 400, 700, 'bgImg').setOrigin(0, 0);

    // B. 地面 (設為透明，配合背景圖)
    const ground = this.add.rectangle(200, groundY + 25, 400, 50, 0x66bb6a, 0); 
    this.physics.add.existing(ground, true);

    // C. 建立玩家動畫
    this.anims.create({
        key: 'run',
        frames: [{ key: 'run1' }, { key: 'run2' }],
        frameRate: 10,
        repeat: -1
    });

    // D. 建立玩家
    player = this.physics.add.sprite(80, groundY - 40, 'run1');
    player.play('run');
    player.setOrigin(0.5, 1);
    player.setCollideWorldBounds(true);
    // 微調玩家圖片大小與碰撞箱
    player.setDisplaySize(40, 60); 
    player.body.setSize(25, 55);

    // E. 護盾特效 (初始隱藏)
    shieldVisual = this.add.circle(80, groundY - 40, 30, 0x4fc3f7, 0.4);
    shieldVisual.setStrokeStyle(3, 0x01579b);
    shieldVisual.setVisible(false);

    // F. 物體群組與碰撞
    obstacles = this.physics.add.group();
    this.physics.add.collider(player, ground);
    this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

    // G. UI 顯示
    scoreText = this.add.text(20, 40, '減脂里程: 0m', { fontSize: '24px', fill: '#1b5e20', fontWeight: 'bold', stroke: '#fff', strokeThickness: 2 });

    // H. 生成障礙物計時器
    startSpawning(this);

    // I. 觸控跳躍
    this.input.on('pointerdown', () => {
        // BUG 修正重點：升級暫停時禁止跳躍
        if (!isGameOver && !isPaused && (player.body.touching.down || player.body.blocked.down)) {
            player.body.setVelocityY(-800);
        }
    });
}

// --- 3. 遊戲更新循環 ---
function update() {
    // BUG 修正重點：如果遊戲結束 OR 暫停升級，停止所有逻辑
    if (isGameOver || isPaused) return;

    // 1. 捲動背景 (數值越大跑越快)
    bg.tilePositionX += 2; 

    // 2. 更新里程與文字
    score += 0.25;
    scoreText.setText('減脂里程: ' + Math.floor(score) + 'm');
    
    // 3. 護盾視覺跟隨玩家
    shieldVisual.x = player.x;
    shieldVisual.y = player.y;

    // 4. 動態難度：里程越遠速度越快
    moveSpeed -= 0.1;

    // 5. 動態動畫狀態：跳躍時停止動畫
    if (player.body.touching.down || player.body.blocked.down) {
        if (!player.anims.isPlaying) player.play('run');
    } else {
        player.stop();
    }

    // 6. 倍數升級機制 (100m -> 200m -> 400m...)
    if (score >= nextLevelScore) {
        showLevelUpMenu(this);
        nextLevelScore *= 2; 
    }
}

// --- 4. 功能函數 ---

function startSpawning(scene) {
    if (timerEvent) timerEvent.remove();
    timerEvent = scene.time.addEvent({
        delay: spawnRate,
        callback: () => spawnObstacle(scene),
        loop: true
    });
}

function spawnObstacle(scene) {
    if (isGameOver || isPaused) return;
    const type = Phaser.Math.Between(0, 2);
    // 根據不同類型決定 y 軸位置
    let y = (type === 0) ? config.scale.height - 50 : (type === 1 ? config.scale.height - 150 : config.scale.height - 250);
    
    const obs = scene.add.sprite(450, y, 'obstacle'); // 換成圖片
    obs.setOrigin(0.5, 1);
    obs.setDisplaySize(40, 50); // 請配合 food.png 比例調整
    scene.physics.add.existing(obs);
    obs.body.setAllowGravity(false);
    obs.body.setVelocityX(moveSpeed - Phaser.Math.Between(0, 100));
    obstacles.add(obs);
}

function showLevelUpMenu(scene) {
    isPaused = true; // 暫停遊戲邏輯
    scene.physics.pause();
    timerEvent.paused = true; // 暫停生成障礙物
    player.stop(); // 暫停玩家動畫
    
    const menuGroup = scene.add.container(0, 0);
    const menuBg = scene.add.graphics();
    menuBg.fillStyle(0x000000, 0.85);
    menuBg.fillRect(0, 0, 400, 700);
    menuGroup.add(menuBg);

    const title = scene.add.text(200, 150, '🌱 ESG 能力覺醒', { fontSize: '32px', color: '#81c784', fontWeight: 'bold' }).setOrigin(0.5);
    menuGroup.add(title);

    const subTitle = scene.add.text(200, 200, `距離 LV.${Math.log2(nextLevelScore/50)+1} 還需 ${nextLevelScore}m`, { fontSize: '16px', color: '#aaa'}).setOrigin(0.5);
    menuGroup.add(subTitle);

    const options = [
        { title: '🛡️ 減脂護盾', desc: '獲得抵擋一次傷害的機會', action: () => { hasShield = true; shieldVisual.setVisible(true); } },
        { title: '⚡️ 節能加速', desc: '衝刺 +50m，但移動速度提升', action: () => { score += 50; moveSpeed -= 100; } },
        { title: '📉 垃圾減量', desc: '障礙物出現頻率降低', action: () => { spawnRate += 200; startSpawning(scene); } }
    ];

    options.forEach((opt, index) => {
        const btnY = 320 + (index * 110);
        const btn = scene.add.rectangle(200, btnY, 300, 80, 0x2e7d32).setInteractive();
        const txt = scene.add.text(200, btnY, opt.title + '\n' + opt.desc, { fontSize: '18px', align: 'center', color: '#ffffff', lineSpacing: 5 }).setOrigin(0.5);
        
        menuGroup.add([btn, txt]);

        btn.on('pointerdown', () => {
            opt.action();
            menuGroup.destroy(); // 清除整個選單
            
            isPaused = false; // 恢復遊戲邏輯
            scene.physics.resume();
            timerEvent.paused = false;
        });
    });
}

function hitObstacle(playerSprite, obstacle) {
    if (isGameOver || isPaused) return;
    
    // 護盾判定
    if (hasShield) {
        hasShield = false;
        shieldVisual.setVisible(false);
        obstacle.destroy(); // 撞毀該障礙物，不結束遊戲
        return;
    }

    isGameOver = true;
    this.physics.pause();
    player.setTint(0xffaaaa); // 主角變紅
    player.stop(); // 動畫停止
    this.cameras.main.shake(300, 0.04);

    const finalDist = Math.floor(score);
    const calories = (finalDist * 0.05).toFixed(1);
    const co2 = (finalDist * 0.0002).toFixed(4);

    // 專業結算視窗
    const resultBox = this.add.graphics();
    resultBox.fillStyle(0x000000, 0.9);
    resultBox.fillRoundedRect(30, 180, 340, 380, 15);

    this.add.text(200, 230, `【ESG 減脂戰報】`, { fontSize: '28px', fill: '#81c784', fontWeight: 'bold' }).setOrigin(0.5);
    
    const reportText = 
        `🏃 慢跑里程：${finalDist} m\n⭐ 達成等級：LV.${Math.log2(nextLevelScore/50)}\n\n🔥 消耗熱量：${calories} kcal\n🌿 累積減碳：${co2} kg-CO2e\n\n「您的每一小步，\n  都是公司淨零排放的一大步！」`;

    this.add.text(200, 370, reportText, { fontSize: '20px', fill: '#ffffff', align: 'center', lineSpacing: 10 }).setOrigin(0.5);

    const restartBtn = this.add.text(200, 510, '◀ 重新挑戰 ▶', { fontSize: '22px', fill: '#fff', backgroundColor: '#d32f2f', padding: 12 })
        .setOrigin(0.5).setInteractive().on('pointerdown', () => window.location.reload());
}
</script>
</body>
</html>
