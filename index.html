<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ESG 減脂挑戰：尺寸優化版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
// --- 遊戲配置 ---
const GAME_WIDTH = 400;
const GAME_HEIGHT = 700;

const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: GAME_WIDTH, height: GAME_HEIGHT },
    physics: { default: 'arcade', arcade: { gravity: { y: 2200 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

// --- 全域變數 ---
let player, obstacles, scoreText, levelText, score = 0, isGameOver = false, isPaused = false;
let nextLevelScore = 100, currentLevel = 1, hasShield = false, shieldVisual, moveSpeed = -450, spawnRate = 1200, timerEvent, bg;

const game = new Phaser.Game(config);

// --- 1. 資源預載 ---
function preload() {
    this.load.image('run1', 'player_run1.png');
    this.load.image('run2', 'player_run2.png');
    this.load.image('food', 'food.png'); // 原始 64x64
    this.load.image('bgImg', 'BG.png'); // 原始巨大 8686*2684
}

// --- 2. 場景建立 ---
function create() {
    // 初始化狀態
    isGameOver = false; isPaused = false; score = 0; currentLevel = 1; moveSpeed = -450; spawnRate = 1200; nextLevelScore = 100; hasShield = false;
    const groundY = config.scale.height - 50;

    // --- 修正 1：巨大背景縮放 ---
    // 先建立 TileSprite
    bg = this.add.tileSprite(0, 0, GAME_WIDTH, GAME_HEIGHT, 'bgImg').setOrigin(0, 0).setDepth(0);
    
    // 計算縮放比 (讓巨大圖片貼合畫布高度)
    const bgScale = GAME_HEIGHT / 2684; // 圖片原始高度
    bg.tileScaleX = bgScale;
    bg.tileScaleY = bgScale;

    // 地面 (設為透明)
    const ground = this.add.rectangle(200, groundY + 25, GAME_WIDTH, 50, 0x66bb6a, 0); 
    this.physics.add.existing(ground, true);

    // 人物動畫
    this.anims.create({
        key: 'run_anim',
        frames: [{ key: 'run1' }, { key: 'run2' }],
        frameRate: 10,
        repeat: -1
    });

    // 玩家 - 設定 Depth 確保在中間
    player = this.physics.add.sprite(80, groundY - 40, 'run1').setDepth(5);
    player.play('run_anim');
    player.setOrigin(0.5, 1);
    player.setDisplaySize(60, 60); // 人物大小
    player.body.setCollideWorldBounds(true);
    player.body.setSize(30, 50);

    // 護盾
    shieldVisual = this.add.circle(0, 0, 35, 0x4fc3f7, 0.4).setDepth(6);
    shieldVisual.setStrokeStyle(3, 0x01579b);
    shieldVisual.setVisible(false);

    // 障礙物群組
    obstacles = this.physics.add.group();

    this.physics.add.collider(player, ground);
    this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

    // UI - 最上層
    scoreText = this.add.text(20, 40, '減脂里程: 0m', { fontSize: '24px', fill: '#ffffff', stroke: '#000', strokeThickness: 4 }).setDepth(20);
    levelText = this.add.text(20, 75, '挑戰等級: LV.1', { fontSize: '18px', fill: '#81c784', stroke: '#000', strokeThickness: 3 }).setDepth(20);

    startSpawning(this);

    // 觸控跳躍
    this.input.on('pointerdown', () => {
        if (!isGameOver && !isPaused && (player.body.touching.down || player.body.blocked.down)) {
            player.body.setVelocityY(-950);
        }
    });
}

// --- 3. 遊戲更新循環 ---
function update() {
    if (isGameOver || isPaused) return;

    // --- 背景捲動修正 ---
    // 因為背景被縮放了，捲動速度需要調整，否則看起來會超慢
    bg.tilePositionX += 15; // 增加捲動速度

    score += 0.25;
    scoreText.setText('減脂里程: ' + Math.floor(score) + 'm');
    
    // 護盾位置
    shieldVisual.x = player.x;
    shieldVisual.y = player.y - 30;

    // 動態提速
    moveSpeed -= 0.08;

    // 跳躍定格動畫
    if (player.body.touching.down || player.body.blocked.down) {
        if (!player.anims.isPlaying) player.play('run_anim');
    } else {
        player.stop();
    }

    // 倍數觸發升級 (100 -> 200 -> 400...)
    if (score >= nextLevelScore) {
        showLevelUpMenu(this);
        currentLevel++;
        nextLevelScore *= 2; 
        levelText.setText('挑戰等級: LV.' + currentLevel);
    }
}

// --- 4. 功能函數 ---

function startSpawning(scene) {
    if (timerEvent) timerEvent.remove();
    timerEvent = scene.time.addEvent({
        delay: spawnRate,
        callback: () => spawnObstacle(scene),
        loop: true
    });
}

function spawnObstacle(scene) {
    if (isGameOver || isPaused) return;
    const type = Phaser.Math.Between(0, 2);
    // 高中低空障礙物高度
    let y = (type === 0) ? GAME_HEIGHT - 50 : (type === 1 ? GAME_HEIGHT - 160 : GAME_HEIGHT - 270);
    
    // --- 修正 2：障礙物圖片優化 ---
    // 設定原始 64x64 大小，並確保 Depth 高於背景和玩家
    const obs = scene.add.sprite(450, y, 'food').setDepth(10);
    obs.setOrigin(0.5, 1);
    obs.setDisplaySize(64, 64); // 使用圖片原始大小
    
    scene.physics.add.existing(obs);
    obs.body.setAllowGravity(false);
    obs.body.setVelocityX(moveSpeed - Phaser.Math.Between(0, 100));
    obstacles.add(obs);
}

function showLevelUpMenu(scene) {
    // ... 保持原有邏輯 ...
}

function hitObstacle(p, obs) {
    // ... 保持原有邏輯 ...
}
</script>
</body>
</html>
