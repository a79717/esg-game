<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ESG 企業減脂：完全修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
// --- 遊戲配置 ---
const config = {
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 400,
        height: 700
    },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2200 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

// --- 全域變數 ---
let player, obstacles, scoreText, score = 0, isGameOver = false, isPaused = false;
let nextLevelScore = 100, hasShield = false, shieldVisual, moveSpeed = -450, spawnRate = 1200, timerEvent, bg;

const game = new Phaser.Game(config);

function preload() {
    this.load.image('run1', 'player_run1.png');
    this.load.image('run2', 'player_run2.png');
    this.load.image('obstacle', 'food.png');
    this.load.image('bgImg', 'BG.png'); // 400x700 背景
}

function create() {
    // 初始化狀態
    isGameOver = false; isPaused = false; score = 0; moveSpeed = -450; spawnRate = 1200; nextLevelScore = 100; hasShield = false;

    // A. 建立捲動背景 (直立 400x700)
    bg = this.add.tileSprite(0, 0, 400, 700, 'bgImg').setOrigin(0, 0);

    // --- B. 關鍵修改：重新設定地平線 ---
    // 將地面位置稍微調高，設定在 650 像素處，確保障礙物清晰可見
    const groundY = 650; 
    const ground = this.add.rectangle(200, groundY + 25, 400, 50, 0x000000, 0); // 透明
    this.physics.add.existing(ground, true);

    // C. 建立玩家動畫
    this.anims.create({
        key: 'run',
        frames: [{ key: 'run1' }, { key: 'run2' }],
        frameRate: 10,
        repeat: -1
    });

    // --- D. 核心修改：恢復人物清晰比例 ---
    // 建立玩家並放在地平面上
    player = this.physics.add.sprite(80, groundY, 'run1');
    player.play('run');
    player.setOrigin(0.5, 1);
    
    // 刪除舊的 player.setDisplaySize(40, 60); 
    // 直接使用原始圖片大小，不再壓縮
    
    player.body.setCollideWorldBounds(true);
    // 配合原始大小微調碰撞箱 (x, y, width, height)
    player.body.setSize(25, player.height * 0.9);

    // E. 護盾特效 (初始隱藏)
    shieldVisual = this.add.circle(80, groundY - 30, 30, 0x4fc3f7, 0.4);
    shieldVisual.setStrokeStyle(3, 0x01579b);
    shieldVisual.setVisible(false);

    // F. 物體群組與碰撞
    obstacles = this.physics.add.group();
    this.physics.add.collider(player, ground);
    this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

    // G. UI 顯示 (文字加白色外框，增加在暗色背景下的可讀性)
    scoreText = this.add.text(20, 40, '減脂里程: 0m', { 
        fontSize: '24px', 
        fill: '#1b5e20', 
        fontWeight: 'bold',
        stroke: '#ffffff',
        strokeThickness: 3
    });

    // H. 生成計時器
    startSpawning(this);

    // I. 觸控跳躍
    this.input.on('pointerdown', () => {
        if (!isGameOver && !isPaused && (player.body.touching.down || player.body.blocked.down)) {
            player.body.setVelocityY(-950);
        }
    });
}

function update() {
    if (isGameOver || isPaused) return;

    bg.tilePositionX += 2; // 背景捲動
    score += 0.25;
    scoreText.setText('減脂里程: ' + Math.floor(score) + 'm');
    
    // 護盾位置對準身體中心
    shieldVisual.x = player.x;
    shieldVisual.y = player.y - player.height / 2;

    moveSpeed -= 0.05; // 動態提速

    // 動態動畫播放狀態 (跳躍中停止動畫)
    if (player.body.touching.down || player.body.blocked.down) {
        if (!player.anims.isPlaying) player.play('run');
    } else {
        player.stop();
    }

    // 里程加倍門檻
    if (score >= nextLevelScore) {
        showLevelUpMenu(this);
        nextLevelScore *= 2; 
    }
}

function startSpawning(scene) {
    if (timerEvent) timerEvent.remove();
    timerEvent = scene.time.addEvent({
        delay: spawnRate,
        callback: () => spawnObstacle(scene),
        loop: true
    });
}

function spawnObstacle(scene) {
    if (isGameOver || isPaused) return; 
    
    const type = Phaser.Math.Between(0, 2);
    // --- 關鍵修改：調高障礙物出現高度 ---
    // 低、中、高空高度分別在地面上方 10, 110, 210 像素處
    let y = (type === 0) ? 640 : (type === 1 ? 540 : 440);
    
    // 確保障礙物 Depth 高於玩家
    const obs = scene.add.sprite(450, y, 'obstacle').setDepth(10);
    obs.setOrigin(0.5, 1);
    
    // 如果 food.png 沒出來，噴出一個紅色色塊方塊作為保險
    if (!obs.texture || obs.texture.key === '__MISSING') {
        obs.destroy();
        const fallbackRect = scene.add.rectangle(450, y, 40, 40, 0xff0000).setDepth(10);
        scene.physics.add.existing(fallbackRect);
        fallbackRect.body.setAllowGravity(false);
        fallbackRect.body.setVelocityX(moveSpeed - Phaser.Math.Between(0, 100));
        obstacles.add(fallbackRect);
    } else {
        obs.setDisplaySize(40, 50); // 請配合 food.png 比例調整
        scene.physics.add.existing(obs);
        obs.body.setAllowGravity(false);
        obs.body.setVelocityX(moveSpeed - Phaser.Math.Between(0, 100));
        obstacles.add(obs);
    }
}

function showLevelUpMenu(scene) {
    // ... 保持原有邏輯 ...
}

function hitObstacle(playerSprite, obstacle) {
    // ... 保持原有邏輯 ...
}
</script>
</body>
</html>
