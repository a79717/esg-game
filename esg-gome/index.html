<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ESG 超慢跑 - 手機版</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        /* 關鍵 2：移除邊距，讓遊戲填滿畫面 */
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    // 關鍵 3：自動縮放模式 (Scale Manager)
    scale: {
        mode: Phaser.Scale.FIT, // 自動縮放以適應螢幕
        autoCenter: Phaser.Scale.CENTER_BOTH, // 畫面置中
        width: 400,
        height: 700 // 稍微拉長一點，符合現代手機比例
    },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1800 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

let player, obstacles, scoreText, isGameOver = false, score = 0;

const game = new Phaser.Game(config);

function preload() {}

function create() {
    isGameOver = false; score = 0;
    const groundY = config.scale.height - 50;

    // 背景與地面
    this.cameras.main.setBackgroundColor('#e8f5e9');
    const ground = this.add.rectangle(200, groundY + 25, 400, 50, 0x4caf50);
    this.physics.add.existing(ground, true);

    // 玩家
    player = this.add.rectangle(80, groundY - 40, 40, 40, 0x2196f3);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);

    // 障礙物群組
    obstacles = this.physics.add.group();

    // 碰撞判定
    this.physics.add.collider(player, ground);
    this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

    // UI
    scoreText = this.add.text(20, 40, '減脂里程: 0m', { fontSize: '24px', fill: '#1b5e20', fontWeight: 'bold' });

    // 定時生成 (手機版節奏快一點比較好玩)
    this.time.addEvent({ delay: 1200, callback: spawnObstacle, callbackScope: this, loop: true });

    // 關鍵 4：行動端觸控點擊
    this.input.on('pointerdown', () => {
        if (player.body.touching.down || player.body.blocked.down) {
            player.body.setVelocityY(-800);
        }
    });
}

function update() {
    if (isGameOver) return;
    score += 0.2;
    scoreText.setText('減脂里程: ' + Math.floor(score) + 'm');
}

function spawnObstacle() {
    if (isGameOver) return;
    const type = Phaser.Math.Between(0, 2);
    let y = (type === 0) ? config.scale.height - 50 : (type === 1 ? config.scale.height - 120 : config.scale.height - 220);
    
    const obs = this.add.rectangle(450, y, 35, 50, 0xff5252);
    obs.setOrigin(0.5, 1);
    obstacles.add(obs);
    this.physics.add.existing(obs);
    obs.body.setAllowGravity(false);
    obs.body.setVelocityX(Phaser.Math.Between(-350, -550));
}

function hitObstacle() {
    if (isGameOver) return;
    isGameOver = true;
    this.physics.pause();
    this.cameras.main.shake(200, 0.02);

    // 結算畫面 (適配手機畫面寬度)
    const resultText = `挑戰失敗！\n\n跑了 ${Math.floor(score)}m\n\n點擊螢幕重新挑戰`;
    this.add.text(config.scale.width/2, config.scale.height/2, resultText, {
        fontSize: '28px', fill: '#d32f2f', align: 'center', backgroundColor: '#fff', padding: 20
    }).setOrigin(0.5).setInteractive().on('pointerdown', () => window.location.reload());
}
</script>
</body>
</html>
